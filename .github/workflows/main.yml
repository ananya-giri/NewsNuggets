name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Backend Dependencies
      working-directory: ./server
      run: npm install
      
    - name: Install Frontend Dependencies
      working-directory: ./01newssum
      run: npm install
      
    - name: Build Frontend
      working-directory: ./01newssum
      run: npm run build
      
    - name: Lint Frontend
      working-directory: ./01newssum
      run: npm run lint
